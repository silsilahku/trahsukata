<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Trah Sukata</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Custom Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@balkangraph/familytree.js@latest/familytree.min.js"></script>
  
  <style>
    :root {
      --bg-color: #F4F0EC; /* Parchment */
      --primary-color: #3D0C02; /* Rich Mahogany */
      --text-color: #2D2D2D;
      --secondary-text: #666;
      --font-header: 'Nunito', sans-serif;
      --font-body: 'Lora', serif;
      --border-color: #E0D8D0;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
    }

    html, body { 
      height: 100%; 
      margin: 0; 
      padding: 0; 
      background-color: var(--bg-color);
      font-family: var(--font-body);
      color: var(--text-color);
      overflow: hidden;
    }

    #tree { 
      width: 100vw; 
      height: 100vh; 
    }

    /* FamilyTree.js Overrides */
    .bjs-tree {
      background-color: var(--bg-color) !important;
    }

    /* Modal Styling - Mobile First */
    .ft-menu-container {
      padding: var(--spacing-md);
    }

    .ft-menu-row { 
      margin-bottom: var(--spacing-md); 
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: var(--spacing-sm);
    }

    .ft-menu-label { 
      font-family: var(--font-header);
      font-weight: 700; 
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary-color);
      margin-bottom: 4px;
    }

    .ft-menu-value { 
      font-size: 1.1rem;
      line-height: 1.4;
      word-break: break-word;
    }

    /* Desktop/Tablet Refinement */
    @media (min-width: 600px) {
      .ft-menu-row {
        flex-direction: row;
        align-items: baseline;
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: var(--spacing-sm);
      }

      .ft-menu-label {
        width: 160px;
        min-width: 160px;
        margin-bottom: 0;
        font-size: 0.85rem;
        text-transform: none;
        letter-spacing: normal;
        color: var(--secondary-text);
      }

      .ft-menu-value {
        font-size: 1rem;
      }
    }

    /* Custom Modal Header */
    .bjs-modal-title {
      font-family: var(--font-header) !important;
      font-weight: 800 !important;
      color: var(--primary-color) !important;
    }

    /* Error Message Styling */
    .error-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: var(--spacing-lg);
      font-family: var(--font-header);
    }
  </style>
</head>
<body>
  <div id="tree"></div>
  <script>
    const ENDPOINT = "https://script.google.com/macros/s/AKfycbyZZl2h8OBb2buS5Qv-3oumCNtC4e9xGHGRa0A6jGJ3Dq6BU8U5QblYnK7nRBz-_WNhVQ/exec";
    const genderMap = {
      "M": "Laki-laki",
      "F": "Perempuan",
      "Laki-laki": "Laki-laki",
      "Perempuan": "Perempuan"
    };

    function processFoto(url) {
      if (typeof url !== "string" || url.trim() === "" || url.trim().toLowerCase() === "null" || url.trim().toLowerCase() === "undefined") {
        return "";
      }
      return url.trim();
    }

    function showDetailModal(d) {
      const rows = [
        { label: "Nama Lengkap", value: d.nama_lengkap },
        { label: "Nama Panggilan", value: d.nama_panggilan },
        { label: "Gender", value: d.gender ? (genderMap[d.gender] || d.gender) : null },
        { label: "Domisili", value: d.domisili },
        { label: "Tahun Lahir", value: d.tahun_lahir },
        { label: "Usia Saat Ini", value: d.usia_saat_ini },
        { label: "Tahun Wafat", value: d.tahun_wafat },
        { label: "Usia Saat Wafat", value: d.usia_saat_wafat },
        { label: "Nama Bapak", value: d.nama_bapak },
        { label: "Nama Ibu", value: d.nama_ibu },
        { label: "Nama Pasangan", value: d.nama_pasangan }
      ];

      const infoHtml = `
        <div class="ft-menu-container">
          ${rows.map(row => `
            <div class="ft-menu-row">
              <span class="ft-menu-label">${row.label}</span>
              <span class="ft-menu-value">${row.value || "-"}</span>
            </div>
          `).join('')}
        </div>
      `;

      FamilyTree.menu.showModal({
        title: "Detail Anggota Keluarga",
        html: infoHtml
      });
    }

    fetch(ENDPOINT)
      .then(res => res.json())
      .then(data => {
        const nodes = data.map(item => {
          const displayName = (item.nama_panggilan && item.nama_panggilan.trim() !== "") ? item.nama_panggilan : item.nama_lengkap;
          const genderFT = (item.gender === "F" || item.gender === "Perempuan") ? "female" : "male";
          const foto = processFoto(item.foto);
          return {
            id: item.id,
            pids: item.sid ? [item.sid] : [],
            fid: item.fid || null,
            mid: item.mid || null,
            name: displayName,
            gender: genderFT,
            img: foto,
            nama_lengkap: item.nama_lengkap,
            nama_panggilan: item.nama_panggilan,
            domisili: item.domisili_terakhir,
            tahun_lahir: item.tahun_lahir,
            usia_saat_ini: item.usia_saat_ini,
            tahun_wafat: item.tahun_wafat,
            usia_saat_wafat: item.usia_saat_wafat,
            nama_bapak: item.nama_bapak,
            nama_ibu: item.nama_ibu,
            nama_pasangan: item.pasangan,
          };
        });

        const family = new FamilyTree(document.getElementById("tree"), {
          template: "john",
          mode: "light",
          mouseWheel: FamilyTree.action.zoom,
          pinch: true,
          scaleInitial: FamilyTree.match.boundary,
          orientation: FamilyTree.orientation.left,
          nodeBinding: {
            field_0: "name",
            field_1: "nama_lengkap",
            img_0: "img"
          },
          nodeMenu: {
            details: { text: "Detail Anggota" }
          },
          onNodeMenuClick: function(sender, args) {
            if(args.menuItem === "details") {
              showDetailModal(args.node);
            }
          },
          onClick: function(sender, args) {
            if (args && args.node) {
              showDetailModal(args.node);
            }
          }
        });

        family.load(nodes);
      })
      .catch(err => {
        document.getElementById("tree").innerHTML = `
          <div class="error-container">
            <b>Gagal memuat data keluarga.<br>Periksa koneksi atau endpoint.</b>
          </div>
        `;
        console.error(err);
      });
  </script>
</body>
</html>
